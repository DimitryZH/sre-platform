name: SLO Release Gate

on:
  pull_request:
    branches:
      - main

jobs:
  slo-release-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa

      - name: Mock SLO metrics (replace with Prometheus query)
        run: |
          echo "fast=2.5" >> $GITHUB_OUTPUT
          echo "slow=1.2" >> $GITHUB_OUTPUT
          echo "budget=75" >> $GITHUB_OUTPUT
        id: slo

      - name: Build OPA input
        run: |
          cat <<EOF > input.json
          {
            "fast_burn": ${{ steps.slo.outputs.fast }},
            "slow_burn": ${{ steps.slo.outputs.slow }},
            "error_budget_remaining": ${{ steps.slo.outputs.budget }},
            "policy": {
              "fast_threshold": 14,
              "slow_threshold": 3,
              "budget_min": 20
            }
          }
          EOF

      - name: Evaluate with OPA
        run: |
          ./opa eval --format=pretty             --data policy/slo.rego             --input input.json             "data.slo"
