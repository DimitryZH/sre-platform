apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adservice
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: online-shop
spec:
  project: default
  source:
    repoURL: https://github.com/DimitryZH/sre-platform
    targetRevision: main
    path: charts/platform
    helm:
      releaseName: adservice
      values: |
        image:
          repository: docker.io/dmitryzhuravlev/online-shop-adservice
          tag: "v0.10.4"
        service:
          port: 9555
        deployment:
          env:
            PORT: "9555"
            PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
        rollouts:
          enabled: false
          analysis:
            prometheusAddress: http://prometheus-operated.monitoring:9090
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
