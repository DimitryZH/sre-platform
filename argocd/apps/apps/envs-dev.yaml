apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-dev
  namespace: argocd
  labels:
    env: dev
spec:
  # Canonical dev path: environment app set under environments/dev/argocd/apps.
  project: default
  source:
    repoURL: https://github.com/DimitryZH/sre-platform
    targetRevision: main
    path: environments/dev/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
