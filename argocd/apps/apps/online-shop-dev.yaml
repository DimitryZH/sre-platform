apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: online-shop
spec:
  project: default
  source:
    repoURL: 'https://github.com/DimitryZH/sre-platform'
    path: 'charts/platform'
    targetRevision: main
    helm:
      releaseName: online-shop-dev
      values: |
        image:
          repository: docker.io/dmitryzhuravlev/online-shop-frontend
          tag: "v0.10.4"
        replicaCount: 1
        service:
          type: ClusterIP
          port: 8080
        rollouts:
          analysis:
            prometheusAddress: http://prometheus-operated.monitoring:9090
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true