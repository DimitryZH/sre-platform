
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop
spec:
  project: default
  source:
    repoURL: https://github.com/DimitryZH/ecommerce-observability-platform
    targetRevision: main
    path: charts/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: online-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
