{{- if .Values.deployment.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ required "values.name is required" .Values.name | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.name | quote }}
    app.kubernetes.io/part-of: online-shop
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name | quote }}
        app.kubernetes.io/part-of: online-shop
{{- with .Values.podLabels }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      containers:
        - name: {{ .Values.name | quote }}
          image: {{ printf "%s:%s" .Values.image.repository (include "online-shop-service.appVersion" .) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
{{- if .Values.probes.enabled }}
          readinessProbe:
{{ toYaml .Values.probes.readiness | indent 12 }}
          livenessProbe:
{{ toYaml .Values.probes.liveness | indent 12 }}
{{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.name }}-config
                optional: true
            - secretRef:
                name: {{ .Values.name }}-secret
                optional: true
{{- with .Values.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- end }}

