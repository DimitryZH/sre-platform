{{- if .Values.break.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: break-500
  labels:
    app.kubernetes.io/name: break-500
    app.kubernetes.io/part-of: online-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: break-500
  template:
    metadata:
      labels:
        app.kubernetes.io/name: break-500
        app.kubernetes.io/part-of: online-shop
    spec:
      containers:
        - name: httpbin
          # go-httpbin provides /status/<code> endpoints we can use to return deterministic 500s.
          image: {{ .Values.break.image | default "mccutchen/go-httpbin:v2.14.0" | quote }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /status/200
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /status/200
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: break-500
  labels:
    app.kubernetes.io/name: break-500
    app.kubernetes.io/part-of: online-shop
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: break-500
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}

