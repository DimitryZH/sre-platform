{{- $host := (printf "frontend.%s" (.Values.global.domain | default "example.com")) -}}
{{- $useHost := .Values.frontend.ingress.useHost -}}
{{- $pathPrefix := (.Values.frontend.ingress.pathPrefix | default "/") -}}
{{- $usePrefixRewrite := ne $pathPrefix "/" -}}
{{- $normalizedPrefix := trimSuffix "/" $pathPrefix -}}
{{- if eq $normalizedPrefix "" -}}
{{- $normalizedPrefix = "/" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # This ingress name is referenced by PrometheusRules and by the Rollout trafficRouting.nginx.stableIngress.
  name: online-shop-frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: online-shop
  {{- if $usePrefixRewrite }}
  annotations:
    # Rewrite non-root prefixed routes to root paths for frontend apps that serve from `/`.
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"
  {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - {{- if $useHost }}
      host: {{ $host | quote }}
      {{- end }}
      http:
        paths:
          - path: {{- if $usePrefixRewrite }} {{ printf "%s(/|$)(.*)" $normalizedPrefix | quote }} {{- else }} {{ $pathPrefix | quote }} {{- end }}
            pathType: {{- if $usePrefixRewrite }} ImplementationSpecific {{- else }} Prefix {{- end }}
            backend:
              service:
                name: frontend
                port:
                  name: http

