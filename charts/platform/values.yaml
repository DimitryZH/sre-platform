frontend:
  name: frontend
  replicaCount: 2
  deployment:
    # Frontend is managed by Argo Rollouts (Rollout resource), not a Deployment.
    enabled: true
  rollouts:
    enabled: false
  image:
    repository: docker.io/dmitryzhuravlev/online-shop-frontend
    tag: "v0.10.4"
  service:
    port: 80
    targetPort: 8080
  configmap:
    data:
      PORT: "8080"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cart:7070"
      RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      CHECKOUT_SERVICE_ADDR: "checkout:5050"
      AD_SERVICE_ADDR: "adservice:9555"
  monitoring:
    serviceMonitor:
      # MUST match `observability/helm/kube-prometheus-stack/values.yaml` serviceMonitorSelector.
      labels:
        release: monitoring

cart:
  name: cart
  replicaCount: 2
  image:
    repository: docker.io/dmitryzhuravlev/online-shop-cartservice
    tag: "v0.10.4"
  service:
    port: 7070
    targetPort: 7070
  configmap:
    data:
      PORT: "7070"
      REDIS_ADDR: "redis:6379"
  monitoring:
    serviceMonitor:
      labels:
        release: monitoring

checkout:
  name: checkout
  replicaCount: 2
