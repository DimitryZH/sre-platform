    targetPort: 5050
  configmap:
    data:
      PORT: "5050"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      PAYMENT_SERVICE_ADDR: "payment:50051"
      EMAIL_SERVICE_ADDR: "emailservice:8080"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cart:7070"
  monitoring:
    serviceMonitor:
      labels:
        release: monitoring

payment:
  name: payment
  replicaCount: 2
  image:
    repository: docker.io/dmitryzhuravlev/online-shop-paymentservice
    tag: "v0.10.4"
  service:
    port: 50051
    targetPort: 50051
  configmap:
    data:
