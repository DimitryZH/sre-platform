apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: online-shop
spec:
  project: default
  # Environment overlay: deploy the platform chart using the dev values file.
  destination:
    server: https://kubernetes.default.svc
    namespace: online-shop-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # ArgoCD multi-source to keep valueFiles stable via $values/... (no fragile ../../ paths).
  sources:
    - repoURL: https://github.com/DimitryZH/sre-platform
      targetRevision: main
      path: charts/platform
      helm:
        releaseName: online-shop-dev
        valueFiles:
          - $values/environments/dev/values/platform.yaml
    - repoURL: https://github.com/DimitryZH/sre-platform
      targetRevision: main
      ref: values

