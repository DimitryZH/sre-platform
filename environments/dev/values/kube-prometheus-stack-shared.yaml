prometheus:
  prometheusSpec:
    # Keep selectors aligned with observability/helm/kube-prometheus-stack/values.yaml
    serviceMonitorSelector:
      matchLabels:
        release: monitoring
    serviceMonitorNamespaceSelector:
      matchNames:
        - online-shop-dev
        - online-shop-stage

    ruleSelector:
      matchLabels:
        release: monitoring
    ruleNamespaceSelector:
      matchNames:
        - monitoring
        - online-shop-dev
        - online-shop-stage

# Avoid ArgoCD deadlocks on kube-prometheus admission hook Jobs/RBAC in dev bootstrap.
prometheusOperator:
  admissionWebhooks:
    # Keep webhook validation non-blocking in dev while patch hooks are disabled.
    failurePolicy: Ignore
    patch:
      enabled: false

