prometheus:
  prometheusSpec:
    # Keep selectors aligned with observability/helm/kube-prometheus-stack/values.yaml
    serviceMonitorSelector:
      matchLabels:
        release: monitoring
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - online-shop-dev
            - online-shop-stage

    ruleSelector:
      matchLabels:
        release: monitoring
    ruleNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - online-shop-dev
            - online-shop-stage

# Avoid ArgoCD deadlocks on kube-prometheus admission hook Jobs/RBAC in dev bootstrap.
prometheusOperator:
  admissionWebhooks:
    # Keep webhook validation non-blocking in dev while patch hooks are disabled.
    failurePolicy: Ignore
    patch:
      enabled: false

