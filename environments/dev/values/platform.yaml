# DEV environment overlay (canonical first deployment target).
# This file is wired via:
#   argocd/apps/root.yaml -> argocd/apps/apps/envs.yaml -> bootstrap-dev
#   -> environments/dev/argocd/apps/online-shop-dev.yaml
#
# It is also used for local validation:
#   make render ENV=dev
#   make preflight ENV=dev

global:
  # Dev workload namespace.
  namespace: online-shop-dev

  # Dev ingress domain.
  domain: dev.example.com

# Pin core service tags explicitly for dev promotion control.
frontend:
  replicaCount: 1
  image:
    tag: v0.10.4

cart:
  replicaCount: 1
  image:
    tag: v0.10.4

checkout:
  replicaCount: 1
  image:
    tag: v0.10.4

payment:
  replicaCount: 1
  image:
    tag: v0.10.4

# Use the shared Prometheus in the `monitoring` namespace for Rollout analyses.
rollouts:
  enabled: false
