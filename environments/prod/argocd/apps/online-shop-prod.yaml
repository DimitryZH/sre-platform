apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-shop-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: online-shop
spec:
  project: default
  # Environment overlay placeholder: production will be promoted later; manual sync only for now.
  destination:
    server: https://kubernetes.default.svc
    namespace: online-shop-prod
  syncPolicy:
    # Intentionally manual for now (no syncPolicy.automated) to prevent accidental deployment.
    syncOptions:
      - CreateNamespace=true
  # ArgoCD multi-source to keep valueFiles stable via $values/... (no fragile ../../ paths).
  sources:
    - repoURL: https://github.com/DimitryZH/sre-platform
      targetRevision: main
      path: charts/platform
      helm:
        releaseName: online-shop-prod
        valueFiles:
          - $values/environments/prod/values/platform.yaml
    - repoURL: https://github.com/DimitryZH/sre-platform
      targetRevision: main
      ref: values

