# Shared monitoring stack (dev+stage). Stage auto-sync enabled.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-shared-stage
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: online-shop
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Needed for large CRDs (kube-prometheus-stack) to avoid client-side apply annotation size limits.
      - ServerSideApply=true
      # Use replace semantics for large CRDs to avoid apply annotation-size limits during bootstrap.
      - Replace=true
  # ArgoCD multi-source application:
  # - Source 1: upstream chart
  # - Source 2: this repo, providing the values file(s)
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 65.5.1
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/observability/helm/kube-prometheus-stack/values.yaml
          - $values/environments/stage/values/kube-prometheus-stack-shared.yaml
    - repoURL: https://github.com/DimitryZH/sre-platform
      targetRevision: main
      ref: values

