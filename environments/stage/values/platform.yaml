# STAGE environment overlay (converged with validated dev baseline).
global:
  namespace: online-shop-stage

frontend:
  replicaCount: 1
  ingress:
    # Keep catch-all ingress for direct LoadBalancer IP validation.
    useHost: false
    # Stage runs hostless on a shared ingress; use a unique path to avoid host "_" collisions with dev.
    pathPrefix: /stage
  rollouts:
    enabled: true
  image:
    tag: v0.10.4

cart:
  replicaCount: 1
  image:
    tag: v0.10.4

checkout:
  replicaCount: 1
  image:
    tag: v0.10.4

payment:
  replicaCount: 1
  image:
    tag: v0.10.4

rollouts:
  enabled: true
