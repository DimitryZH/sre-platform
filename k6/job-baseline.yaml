---
apiVersion: batch/v1
kind: Job
metadata:
  name: online-shop-baseline-load
  namespace: online-shop-load
  labels:
    app.kubernetes.io/part-of: online-shop
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k6
        app.kubernetes.io/part-of: online-shop
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          args: ["run", "/scripts/baseline.js"]
          env:
            - name: BASE_URL
              value: "http://ingress-nginx-controller.ingress-nginx.svc.cluster.local"
            - name: HOST
              value: "frontend.obs.example.com"
            - name: VUS
              value: "20"
            - name: DURATION
              value: "65m"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: online-shop-k6-scripts

