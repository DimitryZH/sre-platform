---
apiVersion: v1
kind: Namespace
metadata:
  name: online-shop-load

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: online-shop-k6-scripts
  namespace: online-shop-load
data:
  baseline.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    // Baseline traffic generator.
    // Purpose: provide a stable denominator so the 1h window doesn't overreact to short spikes.

    export const options = {
      vus: Number(__ENV.VUS || 20),
      duration: __ENV.DURATION || '65m',
    };

    const baseUrl = __ENV.BASE_URL || 'http://ingress-nginx-controller.ingress-nginx.svc.cluster.local';
    const host = __ENV.HOST || 'frontend.obs.example.com';

    export default function () {
      const res = http.get(`${baseUrl}/`, { headers: { Host: host } });
      check(res, { 'baseline: non-5xx': (r) => r.status < 500 });
      sleep(0.1);
    }

  spike.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    // 5m spike: enough to push burn_rate_5m above threshold,
    // while burn_rate_1h stays below threshold thanks to the baseline job.

    export const options = {
      vus: Number(__ENV.VUS || 50),
      duration: __ENV.DURATION || '5m',
    };

    const baseUrl = __ENV.BASE_URL || 'http://ingress-nginx-controller.ingress-nginx.svc.cluster.local';
    const host = __ENV.HOST || 'frontend.obs.example.com';
    const breakPath = __ENV.BREAK_PATH || '/break';
    const errorRate = Number(__ENV.ERROR_RATE || 0.02); // 2%

    export default function () {
      const url = Math.random() < errorRate ? `${baseUrl}${breakPath}` : `${baseUrl}/`;
      const res = http.get(url, { headers: { Host: host } });
      check(res, { 'spike: request completed': (r) => r.status > 0 });
      sleep(0.1);
    }

  sustained.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    // Sustained violation: keep burn_rate_5m and burn_rate_1h above threshold.
    // NOTE: for a true 1h window demonstration, this should run >= 70m.

    export const options = {
      vus: Number(__ENV.VUS || 30),
      duration: __ENV.DURATION || '70m',
    };

    const baseUrl = __ENV.BASE_URL || 'http://ingress-nginx-controller.ingress-nginx.svc.cluster.local';
    const host = __ENV.HOST || 'frontend.obs.example.com';
    const breakPath = __ENV.BREAK_PATH || '/break';
    const errorRate = Number(__ENV.ERROR_RATE || 0.02); // 2%

    export default function () {
      const url = Math.random() < errorRate ? `${baseUrl}${breakPath}` : `${baseUrl}/`;
      const res = http.get(url, { headers: { Host: host } });
      check(res, { 'sustained: request completed': (r) => r.status > 0 });
      sleep(0.1);
    }

