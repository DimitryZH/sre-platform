          env:
            - name: BASE_URL
              value: "http://ingress-nginx-controller.ingress-nginx.svc.cluster.local"
            - name: HOST
              value: "frontend.obs.example.com"
            - name: BREAK_PATH
              value: "/break"
            - name: ERROR_RATE
              value: "0.02"
            - name: VUS
              value: "30"
            - name: DURATION
              value: "70m"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: scripts
          configMap:
            name: online-shop-k6-scripts
