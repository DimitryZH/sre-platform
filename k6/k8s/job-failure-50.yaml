---
apiVersion: batch/v1
kind: Job
metadata:
  name: online-shop-load-failure-50
  namespace: online-shop-dev
  labels:
    app.kubernetes.io/name: online-shop-k6
    app.kubernetes.io/component: failure-test
    app.kubernetes.io/part-of: online-shop
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: online-shop-k6
        app.kubernetes.io/component: failure-test
        app.kubernetes.io/part-of: online-shop
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.49.0
          args: ["run", "/scripts/failure.js"]
          env:
            - name: TARGET_URL
              value: "http://ingress-nginx-controller.ingress-nginx.svc.cluster.local"
            - name: FAILURE_PATH
              value: "/break"
            - name: SCENARIO_LABEL
              value: "failure-50"
            - name: VUS
              value: "20"
            - name: DURATION
              value: "5m"
            - name: SLEEP_SECONDS
              value: "0.1"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 700m
              memory: 384Mi
      volumes:
        - name: scripts
          configMap:
            name: online-shop-k6-scripts
