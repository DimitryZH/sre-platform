# Tuned values for SLO-driven monitoring (online-shop).
#
# Key goals:
# - Prometheus must discover ServiceMonitors created by the online-shop charts.
# - Keep selectors restrictive (avoid scraping random namespaces by default).

prometheus:
  prometheusSpec:
    
    # It tells the Prometheus Operator how to create a PersistentVolumeClaim.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              # Adjust the storage size as needed for your environment
              storage: 20Gi

    # Only scrape ServiceMonitors explicitly labeled for this Prometheus release.
    serviceMonitorSelector:
      matchLabels:
        release: monitoring
    # Namespace selectors are label selectors in recent Prometheus CRDs.
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - online-shop

    podMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - online-shop

    # Only load PrometheusRules explicitly labeled for this Prometheus release.
    ruleSelector:
      matchLabels:
        release: monitoring
    # Namespace selectors are label selectors in recent Prometheus CRDs.
    ruleNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - monitoring
            - online-shop
