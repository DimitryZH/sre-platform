apiVersion: v1
kind: Secret
metadata:
  name: prometheus-basic-auth
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: online-shop
type: Opaque
stringData:
  # IMPORTANT:
  # - This is a placeholder and MUST be replaced before exposing Prometheus.
  # - Value must be an htpasswd file content in the `auth` key.
  #
  # Example (run locally, do NOT commit the generated file):
  #   htpasswd -nbB admin 'CHANGE_ME' > auth
  #   kubectl -n monitoring create secret generic prometheus-basic-auth --from-file=auth=./auth --dry-run=client -o yaml | kubectl apply -f -
  auth: "CHANGE_ME"

