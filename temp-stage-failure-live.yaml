apiVersion: v1
kind: Pod
metadata:
  name: stage-failure-live
  namespace: online-shop-stage
  labels:
    app.kubernetes.io/name: stage-failure-live
spec:
  restartPolicy: Never
  containers:
    - name: traffic
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            wget -q -O /dev/null -T 3 http://ingress-nginx-controller.ingress-nginx.svc.cluster.local/stage/break || true
            sleep 0.2
          done
